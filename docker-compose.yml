version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: relon-crm-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: relon_crm
      POSTGRES_USER: relon_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-relon_dev_password}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U relon_user -d relon_crm']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: relon-crm-backend
    restart: unless-stopped
    ports:
      - '4000:4000'
    environment:
      DATABASE_URL: postgresql://relon_user:${POSTGRES_PASSWORD:-relon_dev_password}@postgres:5432/relon_crm
      DIRECT_URL: postgresql://relon_user:${POSTGRES_PASSWORD:-relon_dev_password}@postgres:5432/relon_crm
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-noreply@relon.com}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      AI_DEFAULT_PROVIDER: ${AI_DEFAULT_PROVIDER:-anthropic}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      GCP_PROJECT_ID: ${GCP_PROJECT_ID}
      GCP_STORAGE_BUCKET: ${GCP_STORAGE_BUCKET}
      GCP_SERVICE_ACCOUNT_KEY_PATH: ${GCP_SERVICE_ACCOUNT_KEY_PATH:-./gcp-service-account-key.json}
      PORT: 4000
      NODE_ENV: ${NODE_ENV:-development}
    volumes:
      - ./gcp-service-account-key.json:/app/gcp-service-account-key.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://localhost:4000/api/health/ready', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
    driver: local
