name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — typecheck + lint + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Generate Prisma client
        run: npm run prisma:generate
        env:
          DATABASE_URL: postgresql://stub:stub@localhost:5432/stub
          DIRECT_URL: postgresql://stub:stub@localhost:5432/stub
      - name: TypeScript check
        run: ./node_modules/.bin/tsc --noEmit
      - name: Build
        run: npm run build
        env:
          DATABASE_URL: postgresql://stub:stub@localhost:5432/stub
          DIRECT_URL: postgresql://stub:stub@localhost:5432/stub
          JWT_SECRET: ci-stub-secret-32-characters-minimum
          ENCRYPTION_KEY: ci-stub-encryption-key-32-characters
